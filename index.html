<html lang="zh-CN">
<head>

    <meta property="og:url" content="https://house.zguo09331.workers.dev/">
    
    <!-- 微信早期兼容缩略图 -->
    <link rel="image_src" href="https://house.zguo09331.workers.dev/img/1.jpg">
    
    <style>
        /* 您的所有 CSS 保持不变 */
    </style>
</head>
<body>

    <!-- 隐藏的分享图，确保页面第一张图片就是它，但不显示 -->
    <img src="https://house.zguo09331.workers.dev/img/1.jpg" style="display:none;" alt="分享缩略图" />

    <!-- 轮播等其他内容保持不变 -->
    <div class="carousel" id="carousel">
        <!-- ... -->
    </div>

    <!-- 内容区 -->
    <div class="content-wrap">
        <!-- ... -->
    </div>

    <!-- 底部联系栏 -->
    <div class="contact-box">
        <!-- ... -->
    </div>

    <!-- 轮播脚本 -->
    <script>
        // ... 原有脚本 ...
    </script>

    <!-- 微信分享卡片增强脚本 -->
    <script>
        (function() {
            var shareData = {
                title: '海景房 · 136.8㎡毛坯四室 | 东西通透',
                desc: '海景房，毛坯房，采光无遮挡，看房随时联系。',
                link: 'https://house.zguo09331.workers.dev/?share=1',
                imgUrl: 'https://house.zguo09331.workers.dev/img/1.jpg'
            };

            function setupWeixinBridge() {
                if (typeof WeixinJSBridge === 'undefined') {
                    document.addEventListener('WeixinJSBridgeReady', setupWeixinBridge, false);
                    return;
                }

                // 好友分享
                WeixinJSBridge.on('menu:share:appmessage', function() {
                    WeixinJSBridge.invoke('sendAppMessage', {
                        "appid": '',
                        "img_url": shareData.imgUrl,
                        "img_width": "200",
                        "img_height": "200",
                        "link": shareData.link,
                        "desc": shareData.desc,
                        "title": shareData.title
                    });
                });

                // 朋友圈
                WeixinJSBridge.on('menu:share:timeline', function() {
                    WeixinJSBridge.invoke('shareTimeline', {
                        "img_url": shareData.imgUrl,
                        "img_width": "200",
                        "img_height": "200",
                        "link": shareData.link,
                        "desc": shareData.desc,
                        "title": shareData.title
                    });
                });

                // 主动设置默认分享数据
                try {
                    WeixinJSBridge.invoke('setPageShareData', {
                        "appid": '',
                        "img_url": shareData.imgUrl,
                        "img_width": "200",
                        "img_height": "200",
                        "link": shareData.link,
                        "desc": shareData.desc,
                        "title": shareData.title
                    });
                } catch (e) {}
            }

            if (/micromessenger/i.test(navigator.userAgent)) {
                setupWeixinBridge();
            }
        })();
    </script>
</body>
</html>
